<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../images/icon.ico">
    <link rel="stylesheet" href="../styles.css">
    <title>numeral representation</title>
</head>
<body>
    
    <div>
        <p>
            <h1 style="display: inline">NumeralRepresentation</h1> <i>(Wolfram Resource Function)</i> displays
            representations of integers in Aegean, Aztec, Babylonian, Cistercian, Egyptian, Greek, 
            Kaktovik, Mayan, Roman, or Suzhou numeral systems.
        </p>

        <p><em><a href="https://resources.wolframcloud.com/FunctionRepository/resources/NumeralRepresentation/">Wolfram Function Repository documentation</a></em></p>

        <div id="numerals" style="max-width: 100%;"></div>
    </div>

    <script src="../setup.js"></script>
    <script>
        let systems = ["Aegean", "ASCII", "Aztec", "Babylonian", "Cistercian", "Kaktovik", "Egyptian", "Greek", "Mayan", "Suzhou"];
        let div = document.getElementById("numerals");

        for (let s of systems) {
            let numdiv = document.createElement("div");
            numdiv.style = "display: flex; align-items: center;"
            numdiv.innerText = s;
            let img = document.createElement("img");
            img.src = "../images/numeral_representation/" + s.toLowerCase() + ".png";
            img.classList.add("smImg");
            img.alt = "The" + s + "numeral for 643";
            numdiv.appendChild(img);
            div.appendChild(numdiv);
        }
    </script>

</body>
</html>
